<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>JAY OS — Personal Command Center</title>
    <meta name="description" content="JAY OS — a personal command center for fitness, music, productivity and growth." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- App boot loader -->
    <div class="boot" id="boot">
      <div class="boot-mark">JAY<span>OS</span></div>
    </div>

    <div class="layout" id="layout">
      <!-- Sidebar navigation -->
      <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark">J<span>OS</span></div>
          <div class="brand-text">
            <strong>JAY OS</strong>
            <span>Command Center</span>
          </div>
        </div>

        <nav class="nav" id="primaryNav" aria-label="Sections"></nav>

        <div class="sidebar-foot">
          <div class="user-chip" id="userChip">
            <div class="avatar" id="userAvatar">JC</div>
            <div class="user-meta">
              <strong id="userName">Joshua Collier</strong>
              <span>Operator</span>
            </div>
          </div>
        </div>
      </aside>

      <div class="sidebar-scrim" id="sidebarScrim" hidden></div>

      <!-- Main column -->
      <div class="main">
        <header class="topbar">
          <button class="icon-btn menu-btn" id="menuToggle" type="button" aria-label="Open menu">
            <span></span><span></span><span></span>
          </button>

          <div class="page-title">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Your life at a glance.</p>
          </div>

          <div class="topbar-actions">
            <div class="search" role="search">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z"/></svg>
              <input id="globalSearch" type="search" placeholder="Search everything…" autocomplete="off" />
              <kbd>/</kbd>
            </div>
            <button class="quick-add" id="quickAddBtn" type="button" aria-label="Quick add">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              <span>Quick Add</span>
            </button>
          </div>
        </header>

        <main class="view" id="view" tabindex="-1"></main>
      </div>
    </div>

    <!-- Search results overlay -->
    <div class="overlay" id="searchOverlay" hidden>
      <div class="overlay-panel search-panel">
        <div class="overlay-head">
          <h3>Search results</h3>
          <button class="icon-btn" data-close-overlay type="button" aria-label="Close">&times;</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>

    <!-- Generic modal host -->
    <div class="overlay" id="modalOverlay" hidden>
      <div class="overlay-panel" id="modalPanel" role="dialog" aria-modal="true"></div>
    </div>

    <!-- Toast host -->
    <div class="toast-host" id="toastHost" aria-live="polite"></div>

    <!-- Mobile bottom bar -->
    <nav class="mobile-bar" id="mobileBar" aria-label="Quick navigation"></nav>

    <script src="app.js"></script>
  </body>
</html>
